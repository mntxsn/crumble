# Sync source strings to Crowdin and pull back translations as a PR.
# https://github.com/crowdin/github-action
#
# Required GitHub repo settings before this is useful:
#   secrets.CROWDIN_PROJECT_ID       — numeric project ID from Crowdin
#   secrets.CROWDIN_PERSONAL_TOKEN   — Crowdin personal access token
#   secrets.GH_TOKEN                 — fine-grained PAT with `contents: write`
#                                      and `pull-requests: write` for this repo
#
# Until those secrets exist the job is skipped, so the workflow stays green.

name: Crowdin Action

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [master, feat/setup-crowdin]

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest
    # secrets.* aren't allowed in step-level `if`; mirror the readiness
    # check into a job-level env var.
    env:
      CROWDIN_READY: ${{ secrets.CROWDIN_PROJECT_ID != '' && secrets.CROWDIN_PERSONAL_TOKEN != '' }}

    steps:
      - name: Checkout
        if: env.CROWDIN_READY == 'true'
        uses: actions/checkout@v4

      - name: crowdin action
        if: env.CROWDIN_READY == 'true'
        uses: crowdin/github-action@1.4.16
        with:
          upload_sources: true
          upload_translations: true
          download_translations: true
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          pull_request_title: "New Crowdin translations"
          pull_request_body: "New Crowdin pull request with translations"
          pull_request_base_branch_name: "master"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
