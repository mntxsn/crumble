# Marks (but does not close — `days-before-close: 0` is "never") issues and
# PRs that have had no activity for ~10 months, so the maintainer can spot
# long-tail neglect during review.
# https://github.com/actions/stale

name: Mark stale issues and pull requests

on:
  schedule:
    - cron: "0 3 * * 0" # Sundays at 03:00 UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "Please report again to bump if the site still has a cookie consent banner, sorry for the delay."
          stale-pr-message: "Please bump if the PR is still relevant."
          stale-issue-label: "no-issue-activity"
          stale-pr-label: "no-pr-activity"
          days-before-close: 0
          days-before-stale: 300
          ascending: true
          sort-by: "updated"
          operations-per-run: 400
