<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="popup">
      <header class="header">
        <img src="../../icons/32.png" alt="" />
        <span class="brand" data-translate="extensionName"></span>
        <a
          id="support"
          href="https://github.com/sponsors/mntxsn"
          target="_blank"
          rel="noopener noreferrer"
          data-translate-title="popupSupport"
          data-translate-aria-label="popupSupport"
        >
          <svg
            viewBox="0 0 24 24"
            width="18"
            height="18"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M12 21s-7-4.35-9.5-8.78C.5 8.5 3 4 7 4c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4 0 6.5 4.5 4.5 8.22C19 16.65 12 21 12 21z"
            />
          </svg>
        </a>
      </header>

      <div id="menu_main" class="menu">
        <button type="button" id="toggle" aria-live="polite" hidden></button>
        <button
          type="button"
          id="pause"
          data-translate="popupPauseOnce"
          data-translate-title="popupPauseOnceHint"
          hidden
        ></button>
        <button type="button" id="refresh" aria-label="Reload page" hidden>
          &#x21bb;
        </button>
        <div class="row">
          <button
            type="button"
            id="report"
            data-translate="menuReport"
            hidden
          ></button>
          <button
            type="button"
            id="options"
            data-translate="optionsTitle"
          ></button>
        </div>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
