<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="popup">
      <header class="header">
        <img src="../../icons/32.png" alt="" />
        <span class="brand" data-translate="extensionName"></span>
        <a
          id="support"
          href="https://github.com/sponsors/mntxsn"
          target="_blank"
          rel="noopener noreferrer"
          data-translate-title="popupSupport"
          data-translate-aria-label="popupSupport"
        >
          <svg
            viewBox="0 0 24 24"
            width="18"
            height="18"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M12 21s-7-4.35-9.5-8.78C.5 8.5 3 4 7 4c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4 0 6.5 4.5 4.5 8.22C19 16.65 12 21 12 21z"
            />
          </svg>
        </a>
      </header>

      <div id="menu_main" class="menu">
        <button
          type="button"
          id="toggle"
          aria-live="polite"
          hidden
        ></button>
        <button
          type="button"
          id="refresh"
          aria-label="Reload page"
          hidden
        >&#x21bb;</button>
        <div class="row">
          <button type="button" id="report" data-translate="menuReport" hidden></button>
          <button type="button" id="options" data-translate="optionsTitle"></button>
        </div>
      </div>

      <div id="menu_report" class="menu menu-hidden">
        <button
          type="button"
          id="report_github"
          data-translate="reportGithub"
        ></button>
        <button
          type="button"
          id="report_anon"
          data-translate="reportAnon"
        ></button>
      </div>

      <div id="menu_report_anon" class="menu menu-hidden">
        <h3>
          <span data-translate="reportAnonTitle"></span>
          <span id="hostname">example.com</span>
        </h3>
        <select id="report_issue_type">
          <option value="general" data-translate="generalIssueOption"></option>
          <option
            value="scrollbar"
            data-translate="scrollbarIssueOption"
          ></option>
          <option value="modal" data-translate="modalIssueOption"></option>
        </select>
        <label
          id="general_issue_description"
          data-translate="reportAnonNotes"
        ></label>
        <label
          id="scrollbar_issue_description"
          data-translate="scrollbarIssueDescription"
        ></label>
        <label
          id="modal_issue_description"
          data-translate="modalIssueDescription"
        ></label>
        <textarea id="report-notes"></textarea>
        <button
          type="button"
          id="report_anon_send"
          class="btn-primary"
          data-translate="reportAnonSend"
        ></button>
        <button
          type="button"
          id="report_anon_cancel"
          data-translate="reportAnonCancel"
        ></button>
      </div>

      <div id="menu_error" class="menu menu-hidden">
        <h2 data-translate="genericErrorTitle"></h2>
        <p data-translate="genericErrorTryAgain"></p>
        <button
          type="button"
          id="error_back_button"
          data-translate="genericErrorBack"
        ></button>
      </div>

      <div id="menu_loading" class="menu menu-hidden">
        <div class="spinner" role="status" aria-label="Loading"></div>
        <p data-translate="menuLoadingText"></p>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
