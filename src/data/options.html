<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/options.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="title"></h1>

      <section class="card">
        <h2 id="general_heading"></h2>

        <div class="field">
          <label class="checkbox-row">
            <input type="checkbox" id="status_indicators" />
            <span id="status_indicators_label"></span>
          </label>
        </div>

        <div class="field">
          <label class="checkbox-row">
            <input type="checkbox" id="debug" />
            <span id="debug_label"></span>
          </label>
        </div>

        <div class="field">
          <label for="theme" class="field-label" id="theme_label"></label>
          <select id="theme">
            <option value="auto" data-translate="optionThemeAuto"></option>
            <option value="light" data-translate="optionThemeLight"></option>
            <option value="dark" data-translate="optionThemeDark"></option>
          </select>
        </div>

        <div class="field">
          <label for="language" class="field-label" id="language_label"></label>
          <select id="language"></select>
          <span class="field-hint" id="language_hint"></span>
        </div>

        <div class="actions">
          <input type="button" id="save" class="btn-primary" value="" />
          <span id="status_saved" class="status-msg"></span>
        </div>
      </section>

      <section class="card">
        <h2 id="whitelist_heading"></h2>
        <div class="field">
          <label
            for="whitelist"
            class="field-label"
            id="whitelist_label"
          ></label>
          <textarea id="whitelist"></textarea>
          <span class="field-hint" id="whitelist_hint"></span>
        </div>

        <hr class="card-divider" />

        <div class="field">
          <label class="checkbox-row">
            <input type="checkbox" id="sync_settings" />
            <span id="sync_settings_label"></span>
          </label>
          <span class="field-hint" id="sync_settings_hint"></span>
        </div>
      </section>

      <section class="card">
        <h2 id="backup_heading"></h2>
        <p class="field-hint" id="backup_hint"></p>
        <div class="actions">
          <input type="button" id="export" value="" />
          <input type="button" id="import_trigger" value="" />
          <input type="file" id="import_file" accept="application/json,.json" />
          <span id="status_import" class="status-msg"></span>
        </div>
      </section>

      <section class="card">
        <h2 id="support_heading"></h2>
        <p class="field-hint" id="support_lead"></p>
        <div class="actions">
          <a
            id="support_link"
            class="btn-primary"
            href="https://github.com/sponsors/mntxsn"
            target="_blank"
            rel="noopener noreferrer"
          ></a>
        </div>
      </section>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
